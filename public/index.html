<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduManager</title>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Heebo;background:#f0f4f8;margin:0}
.screen{display:none}
.screen.active{display:block}
.main-content{padding:15px}
.panel{background:#fff;padding:12px;border-radius:12px;margin:10px 0}
.student-card{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #eee}
.att-btn{padding:5px 8px;border:1px solid #ddd;background:#fff;margin:0 2px;cursor:pointer}
.att-btn.active{background:#1e40af;color:#fff}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <h2>Login</h2>
  <input id="user">
  <input id="pass" type="password">
  <button onclick="login()">כניסה</button>
</div>

<!-- APP -->
<div id="screen-main" class="screen">

  <div class="panel">
    <h3>נוכחות</h3>
    <div id="list"></div>
  </div>

</div>

<script>
let STUDENTS = [];
let ATTENDANCE = JSON.parse(localStorage.getItem("att") || "{}");

async function login(){
  document.getElementById("screen-login").classList.remove("active");
  document.getElementById("screen-main").classList.add("active");
  await loadStudents();
}

async function loadStudents(){
  const res = await fetch("/api/students");
  STUDENTS = await res.json();

  STUDENTS.forEach(s=>{
    if(!ATTENDANCE[s.id]) ATTENDANCE[s.id] = "v";
  });

  render();
}

function setAtt(id,val){
  ATTENDANCE[id]=val;
  localStorage.setItem("att", JSON.stringify(ATTENDANCE));
  render();
}

function render(){
  const el=document.getElementById("list");
  el.innerHTML="";

  STUDENTS.forEach(s=>{
    el.innerHTML += `
      <div class="student-card">
        <div>${s.name}</div>
        <div>
          <button class="att-btn ${ATTENDANCE[s.id]=='v'?'active':''}" onclick="setAtt(${s.id},'v')">✔</button>
          <button class="att-btn ${ATTENDANCE[s.id]=='l'?'active':''}" onclick="setAtt(${s.id},'l')">⏱</button>
          <button class="att-btn ${ATTENDANCE[s.id]=='x'?'active':''}" onclick="setAtt(${s.id},'x')">✖</button>
        </div>
      </div>
    `;
  });
}
</script>

</body>
</html>
