<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EduManager - Mobile Optimized</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">

<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ===== כל ה-CSS שלך נשאר בדיוק אותו דבר (לא שיניתי כלום) ===== */

.att-btn {
  border: 1px solid var(--border);
  background: var(--surface2);
  width: 32px;
  height: 32px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
  color: var(--text2);
}

.att-btn.active { transform: scale(1.05); font-weight: 700; }
.att-btn.v.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
.att-btn.l.active { background: var(--warn-light); color: var(--warn); border-color: var(--warn); }
.att-btn.x.active { background: var(--danger-light); color: var(--danger); border-color: var(--danger); }

body {
  font-family: 'Heebo', sans-serif;
  background: #f0f4f8;
  color: #1a202c;
  direction: rtl;
  min-height: 100vh;
  padding-top: 135px;
}

/* ===== המשך CSS נשאר כפי ששלחת (קוצר כאן רק לצורך הצגה) ===== */
:root {
  --primary:#1e40af;--primary-light:#dbeafe;--primary-dark:#1e3a8a;
  --accent:#059669;--accent-light:#d1fae5;
  --warn:#d97706;--warn-light:#fef3c7;
  --danger:#dc2626;--danger-light:#fee2e2;
  --surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;
  --text:#1a202c;--text2:#64748b;--text3:#94a3b8;
  --radius:12px;--shadow:0 4px 6px -1px rgba(0,0,0,0.05),0 2px 4px -1px rgba(0,0,0,0.03);
}

/* (כל שאר ה-CSS שלך נשאר ללא שינוי) */
</style>
</head>

<body>

<!-- ================= LOGIN + HTML שלך נשאר בדיוק אותו דבר ================= -->

<div id="screen-login" class="screen active">
  <!-- לא נגעתי -->
</div>

<div id="screen-main" class="screen">
  <!-- לא נגעתי -->
</div>

<script>
let classChartInstance = null;
let attendanceChartInstance = null;
let STUDENTS = [];
let ATTENDANCE = {};
let currentUser = null;
let BUSES = [];
let gradeFilter = 'all';

// =====================
// INIT FIX (נוסף כדי למנוע קריסה)
// =====================
function initCalendar() {
  // stub כדי שלא ישבור את האתר
}

// =====================
// LOGIN
// =====================
async function doLogin() {
  const u = document.getElementById('inp-user').value.trim();
  const p = document.getElementById('inp-pass').value;
  const s = document.getElementById('inp-school').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';

  try {
    const response = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p, school: s })
    });

    if (!response.ok) throw new Error();

    const data = await response.json();
    currentUser = data;

    document.getElementById('screen-login').classList.remove('active');
    document.getElementById('screen-main').classList.add('active');

    document.getElementById('greeting-text').textContent = 'שלום, ' + data.name;
    document.getElementById('topbar-school').textContent = data.schoolName;

    document.getElementById('att-date-label').textContent =
      new Date().toLocaleDateString('he-IL');

    await loadStudentsFromServer();
    await loadBuses();

  } catch (e) {
    err.style.display = 'block';
  }
}

// =====================
// STUDENTS
// =====================
async function loadStudentsFromServer() {
  try {
    const res = await fetch('/api/students');
    STUDENTS = await res.json();

    STUDENTS.forEach(st => {
      if (!ATTENDANCE[st.id]) ATTENDANCE[st.id] = 'v';
    });

    updateStats();
    renderAttendance();
    initCalendar();
    updateReports();

  } catch (e) {
    console.error(e);
  }
}

// =====================
// BUSES
// =====================
async function loadBuses() {
  try {
    const res = await fetch('/api/buses');
    BUSES = await res.json();
    renderBuses();
  } catch (e) {}
}

function renderBuses() {
  const grid = document.getElementById('buses-grid');
  grid.innerHTML = '';

  BUSES.forEach(bus => {
    const div = document.createElement('div');
    div.className = 'panel';

    div.innerHTML = `
      <div class="panel-title">${bus.name}</div>
      <div style="font-size:12px;color:#64748b;margin-top:5px">
        ${bus.students.length} תלמידים
      </div>
    `;

    div.onclick = () => openBus(bus);
    grid.appendChild(div);
  });
}

function openBus(bus) {
  document.getElementById('buses-grid').style.display = 'none';
  document.getElementById('bus-details').style.display = 'block';

  document.getElementById('bus-title').textContent = bus.name;
  document.getElementById('bus-from').textContent = bus.from;
  document.getElementById('bus-to').textContent = bus.to;

  const list = document.getElementById('bus-students');
  list.innerHTML = '';

  bus.students.forEach(s => {
    const div = document.createElement('div');
    div.className = 'student-card';
    div.innerHTML = `
      <div class="student-name">${s.name}</div>
      <div class="student-class">${s.class}</div>
    `;
    list.appendChild(div);
  });
}

function closeBus() {
  document.getElementById('bus-details').style.display = 'none';
  document.getElementById('buses-grid').style.display = 'grid';
}

// =====================
// ATTENDANCE
// =====================
function setGradeFilter(val, btn) {
  gradeFilter = val;

  document.querySelectorAll('.att-filter')
    .forEach(b => b.classList.remove('active'));

  btn.classList.add('active');

  renderAttendance();
}

function renderAttendance() {
  const container = document.getElementById('list-attendance');
  container.innerHTML = '';

  const query = document.getElementById('search-att')?.value?.toLowerCase() || '';

  STUDENTS
    .filter(st => {
      const name = (st.name || '').toLowerCase();
      const cls = (st.class || '').toLowerCase();

      return (
        (name.includes(query) || cls.includes(query)) &&
        (gradeFilter === 'all' || (st.class || '').includes(gradeFilter))
      );
    })
    .forEach(st => {

      const status = ATTENDANCE[st.id];
      const initials = (st.name || '').split(' ').map(n => n[0]).join('');

      const card = document.createElement('div');
      card.className = 'student-card';

      card.innerHTML = `
        <div class="student-avatar" style="background:${st.color || '#1e40af'}">
          ${initials}
        </div>

        <div class="student-details">
          <div class="student-name">${st.name}</div>
          <div class="student-class">${st.class}</div>
        </div>

        <div class="att-status-select">
          <button class="att-btn v ${status==='v'?'active':''}" onclick="setAtt(${st.id},'v')">✔</button>
          <button class="att-btn l ${status==='l'?'active':''}" onclick="setAtt(${st.id},'l')">⏱</button>
          <button class="att-btn x ${status==='x'?'active':''}" onclick="setAtt(${st.id},'x')">✖</button>
        </div>
      `;

      container.appendChild(card);
    });
}

function setAtt(id, status) {
  ATTENDANCE[id] = status;
  renderAttendance();
  updateStats();
}

// =====================
// STATS
// =====================
function updateStats() {
  const total = STUDENTS.length;
  let p = 0, a = 0, l = 0;

  Object.values(ATTENDANCE).forEach(v => {
    if (v === 'v') p++;
    if (v === 'l') l++;
    if (v === 'x') a++;
  });

  document.getElementById('stat-total-students').textContent = total;
  document.getElementById('stat-present').textContent = p + l;
  document.getElementById('stat-absent').textContent = a;
}

// =====================
// NAV
// =====================
function switchView(viewId, btn) {
  document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + viewId).classList.add('active');

  document.querySelectorAll('.nav-tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (viewId === 'reports') updateReports();
}

// =====================
// REPORTS
// =====================
function updateReports() {
  const total = STUDENTS.length;
  let present = 0;
  let absent = 0;
  const classCount = {};

  STUDENTS.forEach(s => {
    const status = ATTENDANCE[s.id];

    if (status === 'v' || status === 'l') present++;
    if (status === 'x') absent++;

    const c = s.class || 'לא מוגדר';
    classCount[c] = (classCount[c] || 0) + 1;
  });

  const avg = total ? Math.round((present / total) * 100) : 0;

  document.getElementById('rep-total').textContent = total;
  document.getElementById('rep-avg').textContent = avg + '%';

  drawCharts(classCount, avg);
}

// =====================
// CHARTS
// =====================
function drawCharts(classData, avg) {
  const ctx1 = document.getElementById('classChart');
  const ctx2 = document.getElementById('attendanceChart');

  if (classChartInstance) classChartInstance.destroy();
  if (attendanceChartInstance) attendanceChartInstance.destroy();

  classChartInstance = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: Object.keys(classData),
      datasets: [{ label: 'תלמידים בכיתה', data: Object.values(classData) }]
    }
  });

  attendanceChartInstance = new Chart(ctx2, {
    type: 'doughnut',
    data: {
      labels: ['נוכחים', 'חסרים'],
      datasets: [{ data: [avg, 100 - avg] }]
    }
  });
}
</script>

</body>
</html>
